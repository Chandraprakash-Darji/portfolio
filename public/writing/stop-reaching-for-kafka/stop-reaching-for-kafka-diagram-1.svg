<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 745.4670000000001 418" width="745.4670000000001" height="418" style="--bg:#0d1117;--fg:#e6edf3;--line:#3d444d;--accent:#4493f8;--muted:#9198a1;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<g class="block" data-type="loop" data-label="For each step">
  <rect x="440" y="308" width="275.4670000000001" height="60" rx="0" ry="0" fill="none" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="440" y="308" width="121.27000000000001" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="446" y="317" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">loop [For each step]</text>
</g>
<line class="lifeline" data-actor="Client" x1="70" y1="70" x2="70" y2="388" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="API" x1="210" y1="70" x2="210" y2="388" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Kafka" x1="350" y1="70" x2="350" y2="388" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Worker" x1="490" y1="70" x2="490" y2="388" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="External" x1="637.7335" y1="70" x2="637.7335" y2="388" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="Client" data-to="API" data-label="POST /campaign/launch" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="70" y1="90" x2="210" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="140" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">POST /campaign/launch</text>
</g>
<g class="message" data-from="API" data-to="Kafka" data-label="publish(campaign.launched)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="130" x2="350" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="280" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">publish(campaign.launched)</text>
</g>
<g class="message" data-from="API" data-to="Client" data-label="202 Accepted" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="170" x2="70" y2="170" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="140" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">202 Accepted</text>
</g>
<g class="message" data-from="Kafka" data-to="Worker" data-label="consume(campaign.launched)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="350" y1="210" x2="490" y2="210" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="420" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">consume(campaign.launched)</text>
</g>
<g class="message" data-from="Worker" data-to="Worker" data-label="schedule contacts × steps" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="490,250 520,250 520,270 490,270" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="528" y="260" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">schedule contacts × steps</text>
</g>
<g class="message" data-from="Worker" data-to="External" data-label="send message" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="490" y1="348" x2="637.7335" y2="348" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="563.86675" y="338" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">send message</text>
</g>
<g class="actor" data-id="Client" data-label="Client" data-type="participant">
  <rect x="30" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="70" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Client</text>
</g>
<g class="actor" data-id="API" data-label="API" data-type="participant">
  <rect x="170" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="210" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">API</text>
</g>
<g class="actor" data-id="Kafka" data-label="Kafka (MSK)" data-type="participant">
  <rect x="296.716" y="30" width="106.568" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="350" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Kafka (MSK)</text>
</g>
<g class="actor" data-id="Worker" data-label="Worker" data-type="participant">
  <rect x="450" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="490" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Worker</text>
</g>
<g class="actor" data-id="External" data-label="Email/SMS/Voice" data-type="participant">
  <rect x="570" y="30" width="135.46699999999998" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="637.7335" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Email/SMS/Voice</text>
</g>
</svg>